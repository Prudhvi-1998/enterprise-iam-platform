# Application
spring.application.name=api-gateway
server.port=8080

# Routes
spring.cloud.gateway.server.webmvc.routes[0].id=auth-service
spring.cloud.gateway.server.webmvc.routes[0].uri=http://localhost:8081
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/api/auth/**

spring.cloud.gateway.server.webmvc.routes[1].id=user-service
spring.cloud.gateway.server.webmvc.routes[1].uri=http://localhost:8081
spring.cloud.gateway.server.webmvc.routes[1].predicates[0]=Path=/api/users/**

spring.cloud.gateway.server.webmvc.routes[2].id=audit-service
spring.cloud.gateway.server.webmvc.routes[2].uri=http://localhost:8081
spring.cloud.gateway.server.webmvc.routes[2].predicates[0]=Path=/api/audit/**

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.enabled=true

# Logging
logging.level.org.springframework.cloud.gateway=DEBUG

